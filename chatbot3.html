<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot3</title>
    <style>
        body{
            margin: 0;
            padding: 0 10px;
            font-family: Arial;
        }

        .app-container{
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            /* padding: 20px; */
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .send-button{
            background-color: rgb(25, 135, 84);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            margin-left: 10px;
            cursor: pointer;
        }

        .chat-input{
            padding: 12px 15px;
            font-size: 15px;
            flex-grow: 1;
            border-radius: 12px;
            border-width: 1px;
            
        }

        .chat-input-container{
            display: flex; 
            /* margin-top: 20px; */
            margin-bottom: 60px;   
        }

        .chat-message-user{
            display: flex;
            justify-content: end;
            align-items: start;
        }

        .chat-message-robot{
            display: flex;
            align-items: start;
        }

        .chat-message{
            background-color: rgb(238, 238, 238);
            padding: 15px 20px;
            margin: 0 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            max-width: 300px;
        }

        .chat-img{
            width: 45px;
            
        }

        .chat-messages-container{
            flex-grow: 1;
            margin-top: 20px;
            overflow: scroll;
            scrollbar-width: none;
        }

        .para{
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            text-align: center;
            color: rgb(25, 135, 84);
        }

        .loading-img{
            height: 40px;
            margin: -15px;
        }
    </style>
</head>
<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        function ChatInput({chatMessages, setChatMessages}){
            const [inputText, setInputText] = React.useState('');    //set the state to its initial value, which is empty ''

            function saveInputText(event){
               setInputText(event.target.value);   //InputText is what we typed inside the input box
            }

            function handleKeyDown(){
                if(event.key === 'Enter'){
                    sendMessage();
                }

                else if(event.key === 'Escape'){
                    setInputText('');
                }
            }

            async function sendMessage(){
                const newChatMessages = [
                    ...chatMessages,
                    {
                        message: inputText,
                        sender: "user",
                        id: crypto.randomUUID()
                    }
                ];
                setChatMessages(newChatMessages);  
                
                setInputText('');
                const loadChatMessages = [
                    ...chatMessages,
                    {
                        message: <img src="./img/loading-spinner.gif" className="loading-img" />,
                        sender: "robot",
                        id: crypto.randomUUID()
                    }
                ];
                setChatMessages(loadChatMessages)

                const response = await Chatbot.getResponseAsync(inputText);
                setChatMessages([
                    ...newChatMessages,
                    {
                        message: response,
                        sender: "robot",
                        id: crypto.randomUUID()
                    }
                ]);    

                setInputText('');  //removes the text from the text box after sending
            }

            return(
                <div className="chat-input-container">
                    <input 
                        placeholder="Send a message to Chatbot" 
                        size="30" 
                        onChange={saveInputText}
                        value={inputText}   //value=change the text inside this <input>
                        onKeyDown={handleKeyDown}
                        className="chat-input"
                     />
                    <button onClick={sendMessage} 
                    className="send-button" >Send</button>
                </div>
            );
        }

        function ChatMessage({message, sender}){
        //    if(sender === 'user'){
        //      return(
        //         <div>
        //             {message}
        //             <img src="user.png" width= "50" />   
        //         </div>
        //     );
        //    }

            return(
                <div className={sender === 'user' 
                    ? "chat-message-user" 
                    : "chat-message-robot"
                }>
                    {sender === 'robot' && <img src="robot.png" className="chat-img" />}  
                    <div className="chat-message">
                        {message}
                    </div>
                    {sender === 'user' && <img src="user.png" className="chat-img" />}
                </div>
            );
        }

        function ChatMessages({chatMessages}){
            const chatMessagesRef = React.useRef(null);

            React.useEffect(() => {
                const containerElem = chatMessagesRef.current;
                if(containerElem){
                    containerElem.scrollTop = containerElem.scrollHeight;
                }
            }, [chatMessages]);

            if(chatMessages.length === 0){
                return(
                    <p className="para">Welcome to Meshach chatbot project! Send a message using the textbox below</p>
                );
            }

            return(
                <div className="chat-messages-container"
                ref = {chatMessagesRef}>
                    {chatMessages.map((chatMessage) => {
                        return(
                            <ChatMessage message = {chatMessage.message}
                                         sender= {chatMessage.sender}
                                         key= {chatMessage.id}
                            />
                        );
                                
                    })}
                </div>
            );
        }

        function App(){
            const [chatMessages, setChatMessages] = React.useState([]);
            // const chatMessages = array[0];
            // const setChatMessages = array[1];

            return(
                <div className="app-container">
                    <ChatMessages
                        chatMessages={chatMessages} 
                    />

                    <ChatInput
                        chatMessages={chatMessages}
                        setChatMessages={setChatMessages}
                    />
                </div>
            );
        }


        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);
    </script>
</body>
</html>
